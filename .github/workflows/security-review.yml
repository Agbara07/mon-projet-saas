name: Security Review

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_SECURITY_REVIEW_API_KEY }}
        with:
          claude-api-key: ${{ secrets.CLAUDE_SECURITY_REVIEW_API_KEY }}
          comment-pr: true
          upload-results: true
          exclude-directories: "node_modules,dist,.next"
          claudecode-timeout: "30"
          run-every-commit: "true"
